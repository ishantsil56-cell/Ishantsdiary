<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Legendary Enchanted Diary</title>

<style>
:root{
--gold:#d4af37;
--dark:#0b0b0f;
}

body{
margin:0;
font-family: 'Georgia', serif;
background: radial-gradient(circle,#1a1a1a,#000);
color:#f5e6c8;
overflow-x:hidden;
}

header{
padding:15px;
text-align:center;
font-size:22px;
letter-spacing:2px;
background:linear-gradient(90deg,#000,#222);
border-bottom:1px solid var(--gold);
}

.spark{
position:fixed;
width:4px;height:4px;
background:gold;
border-radius:50%;
pointer-events:none;
animation:fade 1s linear;
}
@keyframes fade{
to{opacity:0; transform:translateY(-20px);}
}

.lock{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:black;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:10;
}

.glow{
color:var(--gold);
text-shadow:0 0 20px gold;
}

.container{padding:15px;}

.scroll-row{
display:flex;
overflow-x:auto;
gap:15px;
}

.card{
min-width:200px;
padding:20px;
border-radius:15px;
background:linear-gradient(145deg,#2c1f14,#5a3b1a);
box-shadow:0 0 15px rgba(212,175,55,0.5);
cursor:pointer;
position:relative;
transition:0.4s;
}

.card:hover{
transform:scale(1.08) rotateY(8deg);
box-shadow:0 0 25px gold;
}

.card small{
position:absolute;
bottom:8px;
font-size:11px;
}

.btn{
background:linear-gradient(45deg,#000,var(--gold));
border:none;
padding:10px;
color:white;
border-radius:10px;
}

.view{display:none;}

.book{perspective:1500px;}

.page{
padding:25px;
border-radius:10px;
background:linear-gradient(#f5e6c8,#e0c48f);
color:#2a1a0f;
animation:pageTurn 0.8s;
min-height:260px;
}

@keyframes pageTurn{
0%{transform:rotateY(90deg);opacity:0}
100%{transform:rotateY(0);opacity:1}
}

input,textarea{
width:100%;
margin:5px 0;
padding:10px;
border-radius:10px;
border:none;
background:#fff8dc;
}
</style>
</head>

<body>

<div class="lock" id="lock">
<h2 class="glow">🪄 Magical Riddle Lock</h2>
<p>I open at the close...</p>
<input id="riddleInput">
<button class="btn" onclick="unlock()">Unlock</button>
</div>

<header>📖 Legendary Diary</header>

<div class="container">

<div id="listView">
<div class="scroll-row" id="cards"></div>
<button class="btn" onclick="openForm()">+ New Entry</button>
</div>

<div id="entryView" class="view">
<h3 id="entryDate"></h3>
<h4 id="entryTitle"></h4>
<div class="book"><div id="pages"></div></div>
<button class="btn" onclick="nextPage()">Flip ➡</button>
<button onclick="back()">Back</button>
</div>

<div id="formView" class="view">
<input type="date" id="dateInput">
<input type="text" id="titleInput" placeholder="Title">
<textarea id="textInput"></textarea>
<button class="btn" onclick="saveEntry()">Save</button>
<button onclick="back()">Cancel</button>
</div>

</div>

<script>
document.addEventListener('mousemove',e=>{
let s=document.createElement('div');
s.className='spark';
s.style.left=e.pageX+'px';
s.style.top=e.pageY+'px';
document.body.appendChild(s);
setTimeout(()=>s.remove(),1000);
});

let entries=JSON.parse(localStorage.getItem('diary')||'{}');
let currentDate=null,currentPage=0;

const quotes=[
"Happiness can be found even in darkness.",
"Always.",
"Mischief managed.",
"Fear of a name increases fear.",
"Magic leaves traces."
];

function render(){
let c=document.getElementById('cards');c.innerHTML='';
Object.keys(entries).forEach(d=>{
let card=document.createElement('div');
card.className='card';
card.innerHTML=`<h4>${d}</h4><div>${entries[d].title}</div><small>${quotes[Math.floor(Math.random()*quotes.length)]}</small>`;
card.onclick=()=>openEntry(d);
c.appendChild(card);
});
}

function openEntry(d){
currentDate=d;currentPage=0;
show('entryView');
entryDate.innerText=d;
entryTitle.innerText=entries[d].title;
showPage();
}

function showPage(){
let pages=entries[currentDate].text.split('\\n\\n');
document.getElementById('pages').innerHTML=`<div class='page'>${pages[currentPage]||""}</div>`;
}

function nextPage(){currentPage++;showPage();}

function openForm(){show('formView');}

function saveEntry(){
let d=dateInput.value,t=textInput.value,title=titleInput.value;
let today=new Date().toISOString().split('T')[0];
if(d>today){alert('Future forbidden');return;}
entries[d]={text:t,title:title};
localStorage.setItem('diary',JSON.stringify(entries));
back();render();
}

function back(){show('listView');}
